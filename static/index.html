<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B0B0D">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Recorder</title>
<link rel="manifest" href="/manifest.json">
<link rel="icon" href="/static/logo.png">
<link rel="apple-touch-icon" href="/static/logo.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --obsidian: #0B0B0D;
  --navy: #14213D;
  --gold: #D29E3D;
  --copper: #C87A3B;
  --parchment: #FAF6F0;
  --surface: #111114;
  --surface2: #1a1a1f;
  --muted: #555;
  --danger: #c0392b;
  --teal: #2ecc71;
}

html, body {
  height: 100%;
  font-family: -apple-system, 'Inter', system-ui, sans-serif;
  background: var(--obsidian);
  color: var(--parchment);
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

.app {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 16px 20px 8px;
}
.header img {
  width: 28px;
  height: 28px;
}
.header h1 {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  flex: 1;
}
.user-badge {
  padding: 4px 10px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
  margin-right: 40px;
  background: rgba(210, 158, 61, 0.15);
  color: var(--gold);
}

/* Mode toggle */
.mode-toggle {
  display: flex;
  margin: 0 20px;
  background: var(--surface);
  border-radius: 12px;
  padding: 3px;
  border: 1px solid var(--surface2);
}
.mode-btn {
  flex: 1;
  padding: 8px 12px;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.2s;
}
.mode-btn.active {
  background: rgba(210, 158, 61, 0.12);
  color: var(--gold);
}

/* Main recording area */
.recorder {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 20px;
  gap: 20px;
}

/* Waveform canvas */
.waveform-container {
  width: 100%;
  height: 140px;
  position: relative;
}
.waveform-container.compact {
  height: 60px;
}
#waveform {
  width: 100%;
  height: 100%;
  display: block;
}

/* Live transcript area (Quick Note mode) */
.live-transcript-area {
  width: 100%;
  height: 120px;
  background: var(--surface);
  border: 1px solid var(--surface2);
  border-radius: 12px;
  padding: 14px 16px;
  overflow-y: auto;
  display: none;
  position: relative;
}
.live-transcript-area .final-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--parchment);
}
.live-transcript-area .interim-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--muted);
  font-style: italic;
}
.live-transcript-area .placeholder {
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
}
.live-transcript-area.active {
  border-color: var(--teal);
  box-shadow: 0 0 20px rgba(46, 204, 113, 0.08);
}

/* Timer */
.timer {
  font-size: 36px;
  font-weight: 200;
  font-variant-numeric: tabular-nums;
  color: var(--muted);
  letter-spacing: 2px;
  transition: color 0.3s;
}
.timer.recording { color: var(--gold); }
.timer.small {
  font-size: 24px;
}

/* Status label */
.status {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  height: 16px;
  transition: color 0.3s;
}
.status.recording { color: var(--copper); }

/* Record button */
.record-btn {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 2.5px solid var(--gold);
  background: transparent;
  cursor: pointer;
  position: relative;
  transition: all 0.3s ease;
  -webkit-tap-highlight-color: transparent;
}
.record-btn::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: var(--danger);
  transition: all 0.3s ease;
}
.record-btn.recording {
  border-color: var(--copper);
  box-shadow: 0 0 30px rgba(210, 158, 61, 0.3);
  animation: pulse-ring 2s ease-in-out infinite;
}
.record-btn.recording::after {
  width: 24px;
  height: 24px;
  border-radius: 5px;
}
.record-btn.note-mode {
  border-color: var(--teal);
}
.record-btn.note-mode::after {
  background: var(--teal);
}
.record-btn.note-mode.recording {
  border-color: var(--teal);
  box-shadow: 0 0 30px rgba(46, 204, 113, 0.3);
}
@keyframes pulse-ring {
  0%, 100% { box-shadow: 0 0 20px rgba(210, 158, 61, 0.2); }
  50% { box-shadow: 0 0 40px rgba(210, 158, 61, 0.5); }
}

/* Target selector (in panel) */
.targets {
  display: flex;
  gap: 8px;
  padding: 0 16px 12px;
}
.target-btn {
  flex: 1;
  padding: 8px 0;
  border-radius: 8px;
  border: 1px solid var(--surface2);
  background: var(--surface);
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
  text-align: center;
}
.target-btn.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(210, 158, 61, 0.08);
}

/* Hamburger menu button */
.menu-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 36px;
  height: 36px;
  border: none;
  background: transparent;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 5px;
  z-index: 20;
  padding: 6px;
  border-radius: 8px;
  transition: background 0.2s;
}
.menu-btn:active { background: var(--surface2); }
.menu-btn span {
  display: block;
  width: 20px;
  height: 2px;
  background: var(--muted);
  border-radius: 1px;
  transition: all 0.3s;
}
.menu-btn.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
.menu-btn.open span:nth-child(2) { opacity: 0; }
.menu-btn.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

/* Side panel (slides right-to-left) */
.panel {
  position: fixed;
  top: 0;
  right: 0;
  bottom: 0;
  width: 280px;
  max-width: 80vw;
  background: var(--surface);
  border-left: 1px solid var(--surface2);
  overflow-y: auto;
  transform: translateX(100%);
  transition: transform 0.25s ease;
  z-index: 15;
  box-shadow: -4px 0 24px rgba(0,0,0,0.4);
  padding-top: 56px;
}
.panel.open {
  transform: translateX(0);
}
.panel-backdrop {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 14;
}
.panel-backdrop.show {
  display: block;
}
.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px 8px;
  position: sticky;
  top: 0;
  background: var(--surface);
  z-index: 1;
}
.panel-header h2 {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}
.panel-header span {
  font-size: 11px;
  color: var(--muted);
}

/* Panel sections */
.panel-section {
  border-bottom: 1px solid var(--surface2);
}
.panel-section:last-child {
  border-bottom: none;
}

/* Author tag */
.author-tag {
  display: inline-block;
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-left: 6px;
  vertical-align: middle;
  background: rgba(210, 158, 61, 0.12);
  color: var(--gold);
}

.rec-list {
  padding: 0 12px 12px;
  list-style: none;
}
.rec-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  border-radius: 10px;
  transition: background 0.15s;
}
.rec-item:active { background: var(--surface2); }
.rec-icon {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: rgba(210, 158, 61, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.rec-icon svg { width: 14px; height: 14px; fill: var(--gold); }
.rec-info { flex: 1; min-width: 0; }
.rec-name {
  font-size: 13px;
  font-weight: 500;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.rec-meta {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.rec-actions {
  display: flex;
  gap: 2px;
}
.rec-action {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: none;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  transition: all 0.15s;
}
.rec-action:hover { background: var(--surface2); color: var(--parchment); }
.rec-action.send { color: var(--gold); }

/* Post-recording (note mode only now) */
.post-recording {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.post-recording.visible { display: flex; }
.post-actions {
  display: flex;
  gap: 12px;
}
.post-btn {
  padding: 10px 24px;
  border-radius: 20px;
  border: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.post-btn.primary {
  background: var(--gold);
  color: var(--obsidian);
}
.post-btn.secondary {
  background: var(--surface2);
  color: var(--parchment);
}
.post-btn.clean {
  background: transparent;
  border: 1px solid var(--teal);
  color: var(--teal);
  font-size: 12px;
  padding: 8px 20px;
}
.post-btn:active { transform: scale(0.96); }
.post-btn:disabled { opacity: 0.5; }

/* Toast notification */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface2);
  color: var(--parchment);
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  border: 1px solid var(--surface2);
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 10px;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
.toast.error { border-color: var(--danger); }
.toast .undo-btn {
  background: none;
  border: none;
  color: var(--gold);
  font-weight: 700;
  font-size: 13px;
  cursor: pointer;
  padding: 0;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* Empty state */
.empty {
  text-align: center;
  padding: 24px;
  color: var(--muted);
  font-size: 13px;
}

/* Note word count */
.word-count {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 1px;
}

@media (min-width: 480px) {
  .app { border-left: 1px solid var(--surface2); border-right: 1px solid var(--surface2); }
}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <img src="/static/logo.png" alt="Logo">
    <h1>Recorder</h1>
    <span class="user-badge" id="userBadge"></span>
  </div>
  <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <div class="mode-toggle">
    <button class="mode-btn active" data-mode="voice" id="modeVoice">Voice Message</button>
    <button class="mode-btn" data-mode="note" id="modeNote">Quick Note</button>
  </div>

  <div class="recorder">
    <div class="status" id="status">Ready</div>

    <!-- Voice Message mode -->
    <div class="waveform-container idle" id="waveContainer">
      <canvas id="waveform"></canvas>
    </div>

    <!-- Quick Note mode -->
    <div class="live-transcript-area" id="liveTranscriptArea">
      <span class="placeholder" id="livePlaceholder">Tap record and start speaking...</span>
      <span class="final-text" id="liveFinal"></span>
      <span class="interim-text" id="liveInterim"></span>
    </div>

    <div class="timer" id="timer">00:00</div>
    <span class="word-count" id="wordCount" style="display:none">0 words</span>
    <button class="record-btn" id="recordBtn" aria-label="Record"></button>

    <div class="post-recording" id="postRecording">
      <!-- Quick Note post-actions (voice auto-sends) -->
      <div class="post-actions" id="notePostActions">
        <button class="post-btn primary" id="saveNoteBtn">Save Note</button>
        <button class="post-btn secondary" id="discardNoteBtn">Discard</button>
      </div>
      <button class="post-btn clean" id="cleanNotesBtn" style="display:none">Clean My Notes</button>
    </div>
  </div>

  <div class="panel" id="sidePanel">
    <div class="panel-section" id="targetSection" style="display:none">
      <div class="panel-header">
        <h2>Send to</h2>
      </div>
      <div class="targets" id="targetArea">
        <button class="target-btn active" data-target="local">Local</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-header">
        <h2>Recordings</h2>
        <span id="recCount"></span>
      </div>
      <ul class="rec-list" id="recList"></ul>
    </div>
  </div>
</div>

<div class="panel-backdrop" id="panelBackdrop"></div>
<div class="toast" id="toast"></div>

<script>
// --- State ---
let mediaRecorder = null;
let audioContext = null;
let analyser = null;
let animFrame = null;
let breatheFrame = null;
let chunks = [];
let startTime = 0;
let timerInterval = null;
let currentTarget = localStorage.getItem('rec-target') || 'local';
let currentIdentity = 'unknown';
let currentMode = localStorage.getItem('rec-mode') || 'voice';
let lastBlob = null;
let lastFilename = null;
let undoTimeout = null;

// Speech recognition
let recognition = null;
let finalTranscript = '';
let isRecognizing = false;
const hasSpeechAPI = 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window;

const $ = id => document.getElementById(id);
const recordBtn = $('recordBtn');
const timerEl = $('timer');
const statusEl = $('status');
const waveContainer = $('waveContainer');
const canvas = $('waveform');
const ctx = canvas.getContext('2d');
const postRecording = $('postRecording');
const recList = $('recList');
const recCount = $('recCount');
const toastEl = $('toast');

// Quick Note elements
const liveTranscriptArea = $('liveTranscriptArea');
const liveFinal = $('liveFinal');
const liveInterim = $('liveInterim');
const livePlaceholder = $('livePlaceholder');
const wordCountEl = $('wordCount');
const notePostActions = $('notePostActions');
const saveNoteBtn = $('saveNoteBtn');
const discardNoteBtn = $('discardNoteBtn');
const cleanNotesBtn = $('cleanNotesBtn');

// --- Haptic feedback ---
function haptic(ms = 10) {
  try { navigator.vibrate?.(ms); } catch {}
}

// --- Canvas setup ---
function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * devicePixelRatio;
  canvas.height = rect.height * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// --- Mode toggle ---
function setMode(mode) {
  currentMode = mode;
  localStorage.setItem('rec-mode', mode);

  document.querySelector('.mode-btn.active')?.classList.remove('active');
  document.querySelector(`[data-mode="${mode}"]`)?.classList.add('active');

  if (mode === 'voice') {
    waveContainer.style.display = '';
    waveContainer.classList.remove('compact');
    liveTranscriptArea.style.display = 'none';
    timerEl.classList.remove('small');
    wordCountEl.style.display = 'none';
    recordBtn.classList.remove('note-mode');
  } else {
    waveContainer.style.display = '';
    waveContainer.classList.add('compact');
    liveTranscriptArea.style.display = 'block';
    timerEl.classList.add('small');
    wordCountEl.style.display = '';
    recordBtn.classList.add('note-mode');

    if (!hasSpeechAPI) {
      livePlaceholder.textContent = 'Speech API not available -- Whisper will transcribe after saving';
    }
  }

  postRecording.classList.remove('visible');
  statusEl.textContent = '';
  resetTimer();
  resetLiveTranscript();
  startBreathing();
}

$('modeVoice').addEventListener('click', () => setMode('voice'));
$('modeNote').addEventListener('click', () => setMode('note'));

// --- Identity from Cloudflare Access ---
const userBadge = $('userBadge');
function updateUserBadge() {
  const name = currentIdentity.charAt(0).toUpperCase() + currentIdentity.slice(1);
  userBadge.textContent = name;
}

async function fetchIdentity() {
  try {
    const resp = await fetch('/api/me');
    const data = await resp.json();
    currentIdentity = data.identity || 'unknown';
  } catch {
    currentIdentity = 'unknown';
  }
  updateUserBadge();
}
fetchIdentity();

// --- Target selector (in panel) ---
function initTargets() {
  const btns = document.querySelectorAll('#targetArea .target-btn');
  if (btns.length > 1) {
    $('targetSection').style.display = '';
  }
  btns.forEach(btn => {
    if (btn.dataset.target === currentTarget) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
    btn.addEventListener('click', () => {
      document.querySelector('#targetArea .target-btn.active')?.classList.remove('active');
      btn.classList.add('active');
      currentTarget = btn.dataset.target;
      localStorage.setItem('rec-target', currentTarget);
    });
  });
}
initTargets();

// --- Speech Recognition ---
function initRecognition() {
  if (!hasSpeechAPI) return;
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  recognition.onresult = (event) => {
    let interim = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalTranscript += t + ' ';
      } else {
        interim += t;
      }
    }
    liveFinal.textContent = finalTranscript;
    liveInterim.textContent = interim;
    livePlaceholder.style.display = 'none';
    liveTranscriptArea.scrollTop = liveTranscriptArea.scrollHeight;

    const words = finalTranscript.trim().split(/\s+/).filter(w => w.length > 0).length;
    wordCountEl.textContent = `${words} word${words !== 1 ? 's' : ''}`;
  };

  recognition.onerror = (event) => {
    if (event.error === 'no-speech') return;
    if (event.error === 'not-allowed') {
      toast('Microphone permission denied', true);
      livePlaceholder.textContent = 'Permission denied -- will use Whisper after saving';
      livePlaceholder.style.display = '';
    } else if (event.error === 'network') {
      livePlaceholder.textContent = 'Offline -- will use Whisper after saving';
      livePlaceholder.style.display = '';
    }
  };

  recognition.onend = () => {
    if (isRecognizing && mediaRecorder?.state === 'recording') {
      try { recognition.start(); } catch {}
    }
  };
}

function startRecognition() {
  if (!recognition) initRecognition();
  if (!recognition) return;
  finalTranscript = '';
  liveFinal.textContent = '';
  liveInterim.textContent = '';
  isRecognizing = true;
  try { recognition.start(); } catch {}
}

function stopRecognition() {
  isRecognizing = false;
  if (recognition) { try { recognition.stop(); } catch {} }
  liveInterim.textContent = '';
}

function resetLiveTranscript() {
  finalTranscript = '';
  liveFinal.textContent = '';
  liveInterim.textContent = '';
  livePlaceholder.style.display = '';
  wordCountEl.textContent = '0 words';
  liveTranscriptArea.classList.remove('active');
}

// --- Record toggle ---
recordBtn.addEventListener('click', async () => {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    haptic(15);
    stopRecording();
  } else {
    haptic(10);
    await startRecording();
  }
});

async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

    audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(stream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 128;
    source.connect(analyser);

    const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
      ? 'audio/webm;codecs=opus'
      : 'audio/webm';
    mediaRecorder = new MediaRecorder(stream, { mimeType });
    chunks = [];

    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
    mediaRecorder.onstop = onRecordingStop;
    mediaRecorder.start(100);

    // UI
    stopBreathing();
    recordBtn.classList.add('recording');
    timerEl.classList.add('recording');
    statusEl.classList.add('recording');
    statusEl.textContent = currentMode === 'note' ? 'Listening' : 'Recording';
    postRecording.classList.remove('visible');

    drawWaveform();

    if (currentMode === 'note') {
      liveTranscriptArea.classList.add('active');
      startRecognition();
    }

    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 100);
  } catch (err) {
    toast('Microphone access denied', true);
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
  }
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);

  recordBtn.classList.remove('recording');
  timerEl.classList.remove('recording');
  statusEl.classList.remove('recording');

  if (currentMode === 'note') {
    stopRecognition();
    liveTranscriptArea.classList.remove('active');
  }

  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }

  startBreathing();
}

function onRecordingStop() {
  lastBlob = new Blob(chunks, { type: mediaRecorder.mimeType });

  if (currentMode === 'voice') {
    // Auto-send -- the core QoL improvement
    autoSendVoice(lastBlob);
  } else {
    // Note mode -- show post-actions
    postRecording.classList.add('visible');
    notePostActions.style.display = '';
    cleanNotesBtn.style.display = '';

    if (finalTranscript.trim()) {
      const words = finalTranscript.trim().split(/\s+/).filter(w => w.length > 0).length;
      statusEl.textContent = `${words} words captured`;

      const lower = finalTranscript.toLowerCase();
      if (lower.includes('clean my notes') || lower.includes('organize my notes')) {
        toast('Detected: "Clean my notes"');
      }
    } else {
      statusEl.textContent = 'Will transcribe on save';
    }
  }
}

// --- Auto-send voice message with undo ---
async function autoSendVoice(blob) {
  statusEl.textContent = 'Sending';

  const form = new FormData();
  form.append('audio', blob, 'recording.webm');
  form.append('target', currentTarget);

  let cancelled = false;

  // Show undo toast
  toastEl.innerHTML = '';
  const msgSpan = document.createElement('span');
  msgSpan.textContent = 'Sent';
  const undoBtn = document.createElement('button');
  undoBtn.className = 'undo-btn';
  undoBtn.textContent = 'Undo';
  toastEl.appendChild(msgSpan);
  toastEl.appendChild(undoBtn);
  toastEl.className = 'toast show';

  const undoPromise = new Promise(resolve => {
    undoBtn.addEventListener('click', () => { cancelled = true; resolve('undo'); });
    undoTimeout = setTimeout(() => resolve('send'), 2500);
  });

  const action = await undoPromise;

  if (action === 'undo' || cancelled) {
    clearTimeout(undoTimeout);
    toastEl.className = 'toast';
    statusEl.textContent = '';
    resetTimer();
    toast('Discarded');
    return;
  }

  toastEl.className = 'toast';

  try {
    const resp = await fetch('/api/upload', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.status === 'saved') {
      lastFilename = data.filename;
      const targetLabel = currentTarget.charAt(0).toUpperCase() + currentTarget.slice(1);
      toast(`Saved to ${targetLabel}`);
      loadRecordings();
    } else {
      toast('Upload failed', true);
    }
  } catch (err) {
    toast('Connection error', true);
  }

  statusEl.textContent = '';
  resetTimer();
}

// --- Save Quick Note ---
saveNoteBtn.addEventListener('click', async () => {
  if (!finalTranscript.trim() && !lastBlob) {
    toast('Nothing to save', true);
    return;
  }
  saveNoteBtn.disabled = true;
  saveNoteBtn.textContent = 'Saving...';

  const form = new FormData();
  form.append('audio', lastBlob, 'note.webm');
  form.append('text', finalTranscript.trim() || '[pending-transcription]');
  form.append('type', 'quick-note');
  if (!finalTranscript.trim()) form.append('needs_transcription', 'true');

  try {
    const resp = await fetch('/api/notes', { method: 'POST', body: form });
    const data = await resp.json();
    if (data.status === 'saved') {
      toast('Note saved');
      loadRecordings();
    } else {
      toast(data.error || 'Save failed', true);
    }
  } catch (err) {
    toast('Connection error', true);
  }

  saveNoteBtn.disabled = false;
  saveNoteBtn.textContent = 'Save Note';
  postRecording.classList.remove('visible');
  resetTimer();
  resetLiveTranscript();
});

discardNoteBtn.addEventListener('click', () => {
  lastBlob = null;
  postRecording.classList.remove('visible');
  resetTimer();
  resetLiveTranscript();
  statusEl.textContent = '';
});

// --- Clean My Notes ---
cleanNotesBtn.addEventListener('click', async () => {
  cleanNotesBtn.disabled = true;
  cleanNotesBtn.textContent = 'Organizing...';

  if (finalTranscript.trim() && lastBlob) {
    const form = new FormData();
    form.append('audio', lastBlob, 'note.webm');
    form.append('text', finalTranscript.trim());
    form.append('type', 'quick-note');
    try { await fetch('/api/notes', { method: 'POST', body: form }); } catch {}
  }

  try {
    const resp = await fetch('/api/notes/clean', { method: 'POST' });
    const data = await resp.json();
    if (data.status === 'organized') {
      toast(`${data.organized} note(s) organized`);
    } else {
      toast(data.error || 'Organization failed', true);
    }
  } catch (err) {
    toast('Connection error', true);
  }

  cleanNotesBtn.disabled = false;
  cleanNotesBtn.textContent = 'Clean My Notes';
  postRecording.classList.remove('visible');
  resetTimer();
  resetLiveTranscript();
  loadRecordings();
});

// --- Waveform: active recording ---
function drawWaveform() {
  if (!analyser) return;
  animFrame = requestAnimationFrame(drawWaveform);

  const bufLen = analyser.frequencyBinCount;
  const data = new Uint8Array(bufLen);
  analyser.getByteFrequencyData(data);

  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  const barCount = Math.min(bufLen, 48);
  const barWidth = (w / barCount) * 0.6;
  const gap = (w / barCount) * 0.4;
  const centerY = h / 2;

  for (let i = 0; i < barCount; i++) {
    const val = data[i] / 255;
    const barH = Math.max(2, val * (h * 0.8));
    const x = i * (barWidth + gap) + gap / 2;

    const r = Math.round(210 + val * 20);
    const g = Math.round(158 - val * 40);
    const b = Math.round(61 - val * 20);
    const alpha = 0.4 + val * 0.6;

    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
    ctx.beginPath();
    ctx.roundRect(x, centerY - barH / 2, barWidth, barH, barWidth / 2);
    ctx.fill();
  }
}

// --- Waveform: breathing idle animation ---
let breatheStart = 0;
function drawBreathingWaveform(timestamp) {
  if (!breatheStart) breatheStart = timestamp;
  const elapsed = (timestamp - breatheStart) / 1000;

  const w = canvas.width / devicePixelRatio;
  const h = canvas.height / devicePixelRatio;
  ctx.clearRect(0, 0, w, h);

  const barCount = 48;
  const barWidth = (w / barCount) * 0.6;
  const gap = (w / barCount) * 0.4;
  const centerY = h / 2;

  // Slow breathing cycle: 4s inhale, 4s exhale
  const breathe = Math.sin(elapsed * Math.PI / 4) * 0.5 + 0.5;

  for (let i = 0; i < barCount; i++) {
    // Wave propagation from center outward
    const distFromCenter = Math.abs(i - barCount / 2) / (barCount / 2);
    const wave = Math.sin(elapsed * 1.2 - distFromCenter * 3) * 0.5 + 0.5;
    const val = (breathe * 0.4 + wave * 0.6) * 0.35;

    const barH = 2 + val * 6;
    const x = i * (barWidth + gap) + gap / 2;
    const alpha = 0.15 + val * 0.25;

    ctx.fillStyle = `rgba(210, 158, 61, ${alpha})`;
    ctx.beginPath();
    ctx.roundRect(x, centerY - barH / 2, barWidth, barH, barWidth / 2);
    ctx.fill();
  }

  breatheFrame = requestAnimationFrame(drawBreathingWaveform);
}

function startBreathing() {
  stopBreathing();
  breatheStart = 0;
  breatheFrame = requestAnimationFrame(drawBreathingWaveform);
}

function stopBreathing() {
  if (breatheFrame) {
    cancelAnimationFrame(breatheFrame);
    breatheFrame = null;
  }
}

// --- Timer ---
function updateTimer() {
  const elapsed = Date.now() - startTime;
  const mins = Math.floor(elapsed / 60000);
  const secs = Math.floor((elapsed % 60000) / 1000);
  timerEl.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
}

function resetTimer() {
  timerEl.textContent = '00:00';
}

// --- Recordings list ---
async function loadRecordings() {
  try {
    const resp = await fetch('/api/recordings');
    const recs = await resp.json();
    recCount.textContent = recs.length ? `${recs.length}` : '';

    if (!recs.length) {
      recList.innerHTML = '<li class="empty">No recordings yet</li>';
      return;
    }

    recList.innerHTML = recs.map(r => {
      const date = new Date(r.created);
      const time = date.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      const day = date.toLocaleDateString([], { month: 'short', day: 'numeric' });
      const authorLabel = (r.author || 'unknown').charAt(0).toUpperCase() + (r.author || 'unknown').slice(1);
      const sizeStr = formatBytes(r.size);
      const transcribed = r.has_transcript ? ' \u00b7 T' : '';
      return `
        <li class="rec-item" data-filename="${r.filename}">
          <div class="rec-icon">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </div>
          <div class="rec-info">
            <div class="rec-name">${day}, ${time}<span class="author-tag">${authorLabel}</span></div>
            <div class="rec-meta">${sizeStr}${transcribed}</div>
          </div>
          <div class="rec-actions">
            <button class="rec-action send" onclick="relayRecording('${r.filename}')" title="Send">&#10148;</button>
            <button class="rec-action" onclick="deleteRecording('${r.filename}')" title="Delete">&times;</button>
          </div>
        </li>`;
    }).join('');
  } catch (err) {
    recList.innerHTML = '<li class="empty">Cannot reach server</li>';
  }
}

async function relayRecording(filename) {
  if (currentTarget === 'local') {
    toast('Already local');
    return;
  }
  toast(`Sending to ${currentTarget}...`);
  try {
    const resp = await fetch(`/api/relay/${filename}/${currentTarget}`, { method: 'POST' });
    const data = await resp.json();
    toast(data.status === 'sent' ? `Sent to ${currentTarget}` : (data.error || 'Relay failed'), data.status !== 'sent');
  } catch (err) {
    toast('Connection error', true);
  }
}

async function deleteRecording(filename) {
  try {
    await fetch(`/api/recordings/${filename}`, { method: 'DELETE' });
    loadRecordings();
    toast('Deleted');
  } catch (err) {
    toast('Delete failed', true);
  }
}

// --- Helpers ---
function formatBytes(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

let toastTimer;
function toast(msg, error = false) {
  clearTimeout(toastTimer);
  clearTimeout(undoTimeout);
  toastEl.innerHTML = '';
  toastEl.textContent = msg;
  toastEl.className = 'toast show' + (error ? ' error' : '');
  toastTimer = setTimeout(() => { toastEl.className = 'toast'; }, 2500);
}

// --- Hamburger menu toggle ---
const menuBtn = $('menuBtn');
const sidePanel = $('sidePanel');
const panelBackdrop = $('panelBackdrop');
function togglePanel() {
  const isOpen = sidePanel.classList.toggle('open');
  menuBtn.classList.toggle('open', isOpen);
  panelBackdrop.classList.toggle('show', isOpen);
}
menuBtn.addEventListener('click', togglePanel);
panelBackdrop.addEventListener('click', togglePanel);

// --- Init ---
setMode(currentMode);
loadRecordings();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
